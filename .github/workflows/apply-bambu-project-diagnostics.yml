name: Apply Bambu project diagnostics

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    if: github.head_ref == 'automation/bambu-project-diagnostics-trigger'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply source changes
        run: node scripts/apply-bambu-project-diagnostics.js

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build client
        run: npm run build --prefix client

      - name: Commit tested fix and remove migration files
        run: |
          rm scripts/apply-bambu-project-diagnostics.js
          rm .github/workflows/apply-bambu-project-diagnostics.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/drivers/bambu.js server/tests/bambu-driver.test.js scripts/apply-bambu-project-diagnostics.js .github/workflows/apply-bambu-project-diagnostics.yml
          git commit -m "fix(bambu): restore project print and log firmware replies"
          git push origin HEAD:main

      - name: Close trigger pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr close "${{ github.event.pull_request.number }}" --comment "Diagnostic correction applied to main after tests and client build passed."
