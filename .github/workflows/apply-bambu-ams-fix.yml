name: Apply Bambu AMS fix

on:
  pull_request:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    if: github.event.pull_request.title == 'Run Bambu AMS migration'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply source changes
        run: node scripts/apply-bambu-ams-fix.js

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build client
        run: npm run build

      - name: Commit tested fix and remove migration files
        run: |
          rm -f scripts/apply-bambu-ams-fix.js
          rm -f .github/workflows/apply-bambu-ams-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/drivers/bambu.js \
                  server/routes/gcodes.js \
                  client/src/pages/Projects.jsx \
                  server/tests/bambu-driver.test.js \
                  server/tests/gcodes.test.js \
                  scripts/apply-bambu-ams-fix.js \
                  .github/workflows/apply-bambu-ams-fix.yml
          git commit -m "fix(bambu): support external and multi-filament AMS mappings"
          git push origin HEAD:main

      - name: Close trigger pull request
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr close "$PR_NUMBER" --comment "Bambu AMS migration applied and validated."
